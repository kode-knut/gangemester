<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generer Ikoner - Gangemester</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px;
            background: #F5F5F5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
        }
        canvas {
            border: 1px solid #ddd;
            margin: 20px 0;
            border-radius: 10px;
        }
        button {
            padding: 15px 30px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #1a73e8;
        }
        .icons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .icon-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generer PWA-ikoner</h1>
        <p>Klikk på knappene for å laste ned ikonene.</p>

        <div class="icons-container">
            <div class="icon-item">
                <canvas id="icon192" width="192" height="192"></canvas>
                <button onclick="downloadIcon('icon192', 'icon-192.png')">Last ned 192×192</button>
            </div>

            <div class="icon-item">
                <canvas id="icon512" width="512" height="512"></canvas>
                <button onclick="downloadIcon('icon512', 'icon-512.png')">Last ned 512×512</button>
            </div>
        </div>
    </div>

    <script>
        function drawIcon(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;

            // Gradient bakgrunn
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.roundRect(0, 0, size, size, size * 0.2);
            ctx.fill();

            // Gangetegn (×)
            ctx.fillStyle = 'white';
            ctx.font = `700 ${size * 0.55}px -apple-system, system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('×', size / 2, size * 0.45);

            // Krone emoji
            ctx.globalAlpha = 1;
            ctx.font = `${size * 0.15}px -apple-system, system-ui, sans-serif`;
            ctx.save();
            ctx.translate(size * 0.64, size * 0.22);
            ctx.rotate(15 * Math.PI / 180);
            ctx.fillText('👑', 0, 0);
            ctx.restore();
        }

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Generer ikoner når siden lastes
        window.addEventListener('load', () => {
            drawIcon(document.getElementById('icon192'));
            drawIcon(document.getElementById('icon512'));
        });
    </script>
</body>
</html>
